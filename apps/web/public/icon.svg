<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1622"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>

    <!-- Flame gradient: bright amber top → deep orange → rose bottom -->
    <linearGradient id="flameGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="28%"  stop-color="#fb923c"/>
      <stop offset="68%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>

    <!-- Bright inner core -->
    <linearGradient id="coreGrad" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#fff7ed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fdba74" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Ambient background glow -->
    <radialGradient id="ambient" cx="50%" cy="62%" r="42%">
      <stop offset="0%"   stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter for flame -->
    <filter id="glowF" x="-45%" y="-35%" width="190%" height="170%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to rounded rect so glow doesn't bleed outside -->
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#ambient)"/>

  <g clip-path="url(#iconClip)">

    <!-- FLAME — organic teardrop with pointed tip -->
    <path
      d="M256 88
         C289 126, 354 182, 360 254
         C366 314, 338 358, 317 382
         C296 406, 275 418, 256 420
         C237 418, 216 406, 195 382
         C174 358, 146 314, 152 254
         C158 182, 223 126, 256 88Z"
      fill="url(#flameGrad)"
      filter="url(#glowF)"
    />

    <!-- Inner luminous core -->
    <path
      d="M256 145
         C271 172, 302 204, 306 248
         C310 282, 294 310, 282 327
         C271 342, 262 350, 256 352
         C250 350, 241 342, 230 327
         C218 310, 202 282, 206 248
         C210 204, 241 172, 256 145Z"
      fill="url(#coreGrad)"
    />

    <!-- ECG / pulse line cutting through the flame -->
    <path
      d="M136 300
         L192 300
         L213 268
         L229 338
         L246 240
         L263 338
         L280 268
         L299 300
         L376 300"
      fill="none"
      stroke="white"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.92"
    />

    <!-- Accent dot at ECG peak -->
    <circle cx="246" cy="240" r="9" fill="white" opacity="0.75"/>

  </g>
</svg>
